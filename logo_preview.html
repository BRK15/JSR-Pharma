<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logo Preview - JSR Pharma</title>
    <link rel="icon" type="image/png" href="images/new_color_logo.png">
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f2f5;
            flex-direction: column;
        }

        .container {
            text-align: center;
            background: white;
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        h1 {
            margin-bottom: 30px;
            color: #333;
        }

        .logo-box {
            border: 1px dashed #ccc;
            padding: 20px;
            display: inline-block;
            margin-bottom: 20px;
        }

        img {
            width: 300px;
            height: 300px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Logo Recreation Preview</h1>
        <div class="logo-box">
            <img src="images/logo_recreation.svg" alt="JSR Logo">
        </div>
        <p>A clean, geometric SVG recreation of the JSR monogram.</p>
    </div>
</body>

</html>
